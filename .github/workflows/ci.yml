name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Build test binary
        run: dotnet build VsDebuggerMcp.csproj -o bin/test-build

      - name: Unit Tests
        run: dotnet test --configuration Release --verbosity normal

      - name: Stdio smoke test (no VS required)
        shell: bash
        env:
          Logging__LogLevel__Default: None
        run: |
          RESULT=$( (echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0.0"}}}'; sleep 3) \
            | timeout 10 bin/test-build/VsDebuggerMcp.exe --stdio 2>/dev/null )
          if echo "$RESULT" | grep -q '"protocolVersion"'; then
            echo "Stdio smoke test PASSED"
          else
            echo "Stdio smoke test FAILED"
            echo "Output was: $RESULT"
            exit 1
          fi

      - name: E2E Tests (best-effort, requires VS)
        shell: bash
        continue-on-error: true
        env:
          Logging__LogLevel__Default: None
        run: |
          # Check if VS is installed
          DEVENV=$("C:/Program Files (x86)/Microsoft Visual Studio/Installer/vswhere.exe" \
            -latest -property productPath 2>/dev/null || true)
          if [ -z "$DEVENV" ] || [ ! -f "$DEVENV" ]; then
            echo "Visual Studio not found — skipping E2E tests"
            exit 0
          fi
          echo "Found Visual Studio: $DEVENV"

          # Build TestDebugApp first
          dotnet build test/TestDebugApp/TestDebugApp.csproj -c Debug

          # Run E2E tests — DteConnector will auto-create VS via COM activation
          # if ROT discovery fails (expected in CI)
          bash test/e2e-test.sh --exe bin/test-build/VsDebuggerMcp.exe

      - name: Cleanup Visual Studio
        if: always()
        shell: bash
        continue-on-error: true
        env:
          Logging__LogLevel__Default: None
        run: |
          # Try to close VS gracefully via MCP
          ( echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"cleanup","version":"1.0.0"}}}';
            echo '{"jsonrpc":"2.0","method":"notifications/initialized"}';
            sleep 1;
            echo '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"close_solution","arguments":{"quitVS":true}}}';
            sleep 3
          ) | timeout 15 bin/test-build/VsDebuggerMcp.exe --stdio 2>/dev/null || true

          # Force kill if still running
          taskkill //F //IM devenv.exe 2>/dev/null || true
